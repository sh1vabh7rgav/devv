<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Menu</title>
    <style>
        body { padding: 20px; font-family: Arial, sans-serif; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <table><caption>
        Food Menu
    </caption>
    <thead>
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Chips</td>
            <td>10</td>
            <td>0.25</td>
        </tr>
        <tr>
            <td>Water</td>
            <td>19</td>
            <td>0.29</td>
        </tr>
        <tr>
            <td>Ice Cream</td>
            <td>250</td>
            <td>0.35</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
